name: Publish all NuGet packages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Pack all csproj
      run: |
        mkdir nupkg
        for proj in $(find ./deneOS-Libraries -name "*.csproj"); do
          echo "Packing $proj"
          dotnet pack "$proj" --configuration Release --no-build -o ./nupkg
        done

    - name: Publish all packages
      run: |
        for pkg in ./nupkg/*.nupkg; do
          echo "Publishing $pkg"
          dotnet nuget push "$pkg" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key "${{ secrets.GH_PACKAGES_TOKEN }}" \
            --skip-duplicate
        done

